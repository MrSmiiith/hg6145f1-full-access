<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
	<head>
		<meta http-equiv='Content-Type' content='text/html; charset=utf-8'/>
		<meta HTTP-EQUIV='Pragma' CONTENT='no-cache'>
		<script language ="javascript" type ="text/javascript">
	        document.write('<script  src="../js/util.js?'+new Date().getTime()+'"><'+'/'+'script>');
				document.write('<script  src="../js/aes.js?'+new Date().getTime()+'"><'+'/'+'script>');
			document.write('<script  src="../js/snpwdauth_inter.js?'+new Date().getTime()+'"><'+'/'+'script>');
			
		</script>
	</head>
	<script type="text/javascript">
		setDomain("sncfg");
	</script>
	<body class='main_config_body'>
		<div class="main_header">
			<p class="main_header_hint"><font i18n="sncfg_prompt">sncfg_prompt</font></p>
		</div>
		<br/>
		<form id="loid_form" method="post">
			<div class="main_content">
				<div class="table_bg">
					<div class="table_title"><font i18n="sncfg_snTitle">sncfg_snTitle</font></div>
					<div class="main_item">
						<div class="main_item_name" style="width: 20%;">LOID</div>
						<div class="main_item_content" style="width: calc(80% - 3px);">
							<input type="text" class="input_text" style="width: 130px;" autocomplete="off" disabled maxlength="24" name="LoidId_text" id="LoidId_text"/>
							<span class="redcolorfont">*</span>
							<font i18n="sncfg_loidTips"> sncfg_loidTips</font>
						</div>
						<div id="LOID_error" class="main_item_error_hint_extra"></div>
					</div>
				
					<div class="main_item">
						<div class="main_item_name" style="width: 20%;"><font i18n="sncfg_lopwd">sncfg_lopwd</font></div>
						<div class="main_item_content" style="width: calc(80% - 3px);">
							<input type="text" class="input_text fh-text-security" style="width: 130px;" autocomplete="off" readonly onfocus="removeAttribute('readonly');clearInputValue(this.id)" onblur="resetInputValue(this.id)" maxlength="12" name="Loidpwd_text" id="Loidpwd_text" oncopy="return false" oncut="return false" />
							<input type="checkbox" id="show_password" class="input_button" i18n="change_eye" style="height: 12px; i18n-set="value" onclick="change_eye()"/>&nbsp; &nbsp;	
							<font i18n="sncfg_lopwdTips">sncfg_lopwdTips</font>
						</div>
						<div id="sncfg_lopwd_error" class="main_item_error_hint_extra"></div>
					</div>
				</div>
				<div class="main_item">
					<div class="main_submit" style="width: 20%;"></div>	
					<div class="main_submit" style="width: 80%;">
						<input type="button" id="loid_save" class="input_button" i18n="sncfg_apply" i18n-set="value" onclick="LOIDsaveApply()"/>
						<input type="button" id="loid_cancle"  class="input_button" i18n="sncfg_cancel" i18n-set="value" onclick="LOIDCancel()"/>
					</div>
				</div>
				<br/>
				<div class="table_bg">
					<div class="table_title"><font i18n="sncfg_pwdTitle">sncfg_pwdTitle</font></div>
					<div class="main_item">
						<div class="main_item_name"  style="width: 20%;"><font i18n="sncfg_pwd">sncfg_pwd</font></div>
						<div class="main_item_content" style="width: calc(80% - 3px);">
							<input type="text" class="input_text fh-text-security" style="width: 130px;" autocomplete="off" readonly onfocus="removeAttribute('readonly');clearInputValue(this.id)" onblur="resetInputValue(this.id)" maxlength="10" name="Pwd_password" id="Pwd_password" oncopy="return false" oncut="return false"/>
							<input type="checkbox" id="button_change_eye" class="input_button" i18n="change_eye" style="height: 12px; i18n-set="value" onclick="change_passKey_eye()"/>&nbsp; &nbsp;
							<font i18n="sncfg_pwdTips"> sncfg_pwdTips</font>
						</div>
						<div id="Pwd_password-error" class="main_item_error_hint_extra"></div>
					</div>
				</div>
				<div class="main_item">
					<div class="main_submit" style="width: 20%;"></div>	
					<div class="main_submit" style="width: 80%;">
						<input type="button" id="sncfg_apply" class="input_button" i18n="sncfg_apply" i18n-set="value" onclick="PWDsaveApply()"/>
						<input type="button" id="sncfg_cancel" class="input_button" i18n="sncfg_cancel" i18n-set="value" onclick="PWDCancel()"/>
					</div>
				</div>
			</div>
		</form>
	</body>
</html>
